<div class="container">
  <h1>{{ isEditMode() ? 'Editar' : 'Nova' }} Organização</h1>

  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  <form [formGroup]="organizationForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="corporateName">Razão Social</label>
      <input id="corporateName" type="text" formControlName="corporateName" class="form-control">
    </div>

    <div class="form-group">
      <label for="registrationCode">CNPJ / Código de Registro</label>
      <input id="registrationCode" type="text" formControlName="registrationCode" class="form-control">
    </div>

    <div class="actions">
      <button type="submit" class="btn btn-primary" [disabled]="organizationForm.invalid || isLoading()">
        Salvar
      </button>
      <a routerLink="/organizations" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
