<div class="container">
  <div class="form-card">
    <h1>{{ isEditMode() ? 'Editar' : 'Novo' }} Dispositivo</h1>

    <form [formGroup]="deviceForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="model">Modelo</label>
        <input type="text" id="model" formControlName="model" placeholder="Ex: Coletor Zebra TC21">
      </div>

      <div class="form-group">
        <label for="assetTag">Patrimônio / Asset Tag</label>
        <input type="text" id="assetTag" formControlName="assetTag" placeholder="Ex: TAG-12345">
      </div>

      <div class="form-group">
        <label for="organization">Organização</label>
        <!-- Se for OPERATOR, o campo fica desabilitado pois ele só pode usar a dele -->
        <select id="organization" formControlName="organizationId" [attr.disabled]="authService.isOperator() ? true : null">
          <option [value]="0" disabled>Selecione uma organização</option>
          @for (org of organizations(); track org.id) {
            <option [value]="org.id">{{ org.corporateName }}</option>
          }
        </select>
      </div>

      <div class="form-actions">
        <button type="button" routerLink="/devices" class="btn btn-secondary" [disabled]="isLoading()">Cancelar</button>
        <button type="submit" class="btn btn-primary" [disabled]="deviceForm.invalid || isLoading()">
          {{ isLoading() ? 'Salvando...' : 'Salvar Dispositivo' }}
        </button>
      </div>

      <p class="error" *ngIf="errorMessage()">{{ errorMessage() }}</p>
    </form>
  </div>
</div>
