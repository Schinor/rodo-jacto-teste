<div class="container">
  <h1>{{ isEditMode() ? 'Editar' : 'Novo' }} Dispositivo</h1>

  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  <form [formGroup]="deviceForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="model">Modelo</label>
      <input id="model" type="text" formControlName="model" class="form-control">
    </div>

    <div class="form-group">
      <label for="assetTag">Etiqueta de Ativo</label>
      <input id="assetTag" type="text" formControlName="assetTag" class="form-control">
    </div>

    <div class="form-group">
      <label for="organizationId">Organização</label>
      <select id="organizationId" formControlName="organizationId" class="form-control">
        <option [value]="0">Selecione uma organização</option>
        @for (org of organizations(); track org.id) {
          <option [value]="org.id">{{ org.corporateName }}</option>
        }
      </select>
    </div>

    <div class="actions">
      <button type="submit" class="btn btn-primary" [disabled]="deviceForm.invalid || isLoading()">
        Salvar
      </button>
      <a routerLink="/devices" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
