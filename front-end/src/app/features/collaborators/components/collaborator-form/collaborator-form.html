<div class="container">
  <h1>{{ isEditMode ? 'Editar' : 'Novo' }} Colaborador</h1>

  @if (errorMessage) {
    <p class="error">{{ errorMessage }}</p>
  }

  <form [formGroup]="collaboratorForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="fullName">Nome Completo</label>
      <input id="fullName" type="text" formControlName="fullName" class="form-control">
    </div>

    <div class="form-group">
      <label for="email">E-mail</label>
      <input id="email" type="email" formControlName="email" class="form-control">
    </div>

    @if (!isEditMode) {
      <div class="form-group">
        <label for="password">Senha</label>
        <input id="password" type="password" formControlName="password" class="form-control">
      </div>
    }

    <div class="form-group">
      <label for="accessLevel">Nível de Acesso</label>
      <select id="accessLevel" formControlName="accessLevel" class="form-control">
        <option value="MANAGER">Gerente (MANAGER)</option>
        <option value="OPERATOR">Operador (OPERATOR)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="organizationId">Organização</label>
      <select id="organizationId" formControlName="organizationId" class="form-control">
        <option [value]="0">Selecione uma organização</option>
        @for (org of organizations; track org.id) {
          <option [value]="org.id">{{ org.corporateName }}</option>
        }
      </select>
    </div>

    <div class="actions">
      <button type="submit" class="btn btn-primary" [disabled]="collaboratorForm.invalid || isLoading">
        Salvar
      </button>
      <a routerLink="/collaborators" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
