spring.application.name=rodojacto

spring.datasource.url=jdbc:mysql://localhost:3306/rodojacto_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=admin
spring.datasource.password=rodo1234jacto

# Configuração JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Habilitando o Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration