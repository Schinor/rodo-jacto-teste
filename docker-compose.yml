services:
  db:
    image: mysql:8.0
    container_name: rodojacto_mysql
    restart: always
    environment:
      MYSQL_DATABASE: rodojacto_db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: